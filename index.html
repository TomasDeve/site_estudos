<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meus Estudos — Plataforma de Concursos</title>
<meta name="description" content="Plataforma pessoal de estudos para concursos públicos: planos, edital verticalizado, questões e flashcards, com progresso compartilhado entre concursos.">
<link rel="stylesheet" href="assets/css/styles.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
</head>
<body>

  <!-- topo mobile -->
  <div class="mobile-top">
    <button id="menuBtn">☰</button>
    <b id="mobTitle">Meus Estudos</b>
  </div>

  <div class="app">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div id="sideTop"></div>
      <nav class="nav" id="nav"></nav>
      <div class="side-foot">
        Seu progresso é salvo automaticamente neste navegador.
        <button id="resetAll">⟲ Zerar tudo</button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <section id="view-hub"        class="view"></section>
      <section id="view-dash"       class="view"></section>
      <section id="view-plano"      class="view"></section>
      <section id="view-edital"     class="view"></section>
      <section id="view-quiz"       class="view"></section>
      <section id="view-flash"      class="view"></section>
      <section id="view-estrategia" class="view"></section>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
